<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
	<title>TNOT.TOP</title>
</head>
<body>
    <div class="container">
		<div class="logo">
		    <img src="logo.png" alt="Logo">
		</div>
        <div class="title">这里是TNOT的个人主页</div>
        <div class="subtitle">希望能做出带给大家快乐的作品！</div>
        <div class="message">这里有我做的视频以及一些项目。需要注意的是，大部分编程类项目都是使用AI大模型的，因为我不会编程。</div>
        <div class="card-container">
            <a href="https://space.bilibili.com/1673962232" class="card link-bilibili">
                <span class="card-title">BiliBili主页</span>
                <img src="https://bilibili.com/favicon.ico" alt="BiliBili Logo" class="icon">
            </a>
            <a href="" class="card link-mc">
                <span class="card-title">Minecraft服务器（网页已关闭）</span>
                <img src="mc\favicon.ico" alt="Minecraft Logo" class="icon">
            </a>
            <a href="https://tnot.top/utau" class="card link-utau">
                <span class="card-title">UTAU相关配布</span>
            </a>
        </div>
    
    <!-- B站UP主展示 -->
        <div class="section-title">B站名片</div>
        <div class="bilibili-card">
            <img src="https://i2.hdslb.com/bfs/face/db9f862471c7ba0df076bd1c46157dbad34f745e.jpg@150w_150h.jpg" alt="TNOT头像" class="bili-avatar">
            <div class="bili-info">
                <div class="bili-name-row">
                    <span class="bili-name">TNOT</span>
                    <img src="Lv6.svg" alt="等级" class="bili-level">
                </div>
            </div>
        </div>
    
        <!-- 项目展示 -->
        <div class="section-title">我的项目</div>
        <div class="project-section" id="projectSection">
            <!-- 项目卡片将通过 JavaScript 动态加载 -->
        </div>
    </div>

    <!-- 项目数据 -->
    <script src="projects.js"></script>

    <!-- 日夜模式切换按钮 -->
    <button class="theme-toggle" aria-label="切换主题" onclick="toggleTheme()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path xmlns="http://www.w3.org/2000/svg" d="M10 16.584V18.9996C10 20.1042 10.8954 20.9996 12 20.9996C13.1046 20.9996 14 20.1042 14 18.9996L14 16.584M12 3V4M18.3643 5.63574L17.6572 6.34285M5.63574 5.63574L6.34285 6.34285M4 12H3M21 12H20M17 12C17 14.7614 14.7614 17 12 17C9.23858 17 7 14.7614 7 12C7 9.23858 9.23858 7 12 7C14.7614 7 17 9.23858 17 12Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
		<!-- 图标来自 https://www.svgrepo.com/svg/532865/lightbulb-alt -->
        </svg>
    </button>

    <!-- 主题切换脚本 -->
    <script>
        const toggleTheme = () => {
            const currentTheme = document.body.dataset.theme === "dark" ? "light" : "dark";
            document.body.dataset.theme = currentTheme;
            localStorage.setItem("theme", currentTheme);
        };

        // Initialize theme
        document.body.dataset.theme = localStorage.getItem("theme") || 
                                      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

        // 动态加载项目数据
        function loadProjects() {
            const projectSection = document.getElementById('projectSection');
            projectsData.forEach(project => {
                const card = document.createElement('a');
                card.href = project.url;
                card.target = '_blank';
                card.className = 'project-card';
                
                // 图片加载优化：优先使用缩略图，然后懒加载高清图
                if (project.coverUrl && project.coverUrl.trim()) {
                    card.classList.add('has-cover');
                    
                    // 如果有缩略图，先加载缩略图
                    const imageUrl = project.thumbnailUrl && project.thumbnailUrl.trim() 
                        ? project.thumbnailUrl 
                        : project.coverUrl;
                    
                    card.style.backgroundImage = `url('${imageUrl}')`;
                    
                    // 如果提供了缩略图和高清图，懒加载高清图
                    if (project.thumbnailUrl && project.thumbnailUrl.trim() && 
                        project.coverUrl !== project.thumbnailUrl) {
                        lazyLoadHighResImage(card, project.coverUrl);
                    }
                } else if (project.bgColor && project.bgColor.trim()) {
                    // 如果没有封面但有背景色
                    card.style.backgroundColor = project.bgColor;
                }
                
                card.innerHTML = `
                    <div class="project-overlay"></div>
                    <div class="project-content">
                        <div class="project-title">${project.name}</div>
                        <div class="project-description">${project.description}</div>
                    </div>
                `;
                
                projectSection.appendChild(card);
            });
        }

        // 懒加载高清图片
        function lazyLoadHighResImage(element, highResUrl) {
            const img = new Image();
            img.onload = () => {
                element.style.backgroundImage = `url('${highResUrl}')`;
            };
            // 使用 Intersection Observer 实现懒加载
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            img.src = highResUrl;
                            observer.unobserve(element);
                        }
                    });
                }, { rootMargin: '50px' });
                observer.observe(element);
            } else {
                // 不支持 IntersectionObserver 时直接加载
                img.src = highResUrl;
            }
        }

        // 页面加载时执行
        window.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
